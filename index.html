<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Daily Strategy Insight Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=20260514">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-logo-mark">DSI</div>
        <div class="header-text">
          <div class="header-title">Daily Strategy Insight</div>
          <div class="header-subtitle">전략 정보 인텔리전스 플랫폼</div>
        </div>
      </div>
      <div class="header-right">
        <div class="live-indicator">
          <span class="live-dot"></span>
          <span class="live-label">LIVE</span>
        </div>
        <span id="current-date" class="header-date"></span>
      </div>
    </div>
  </header>

  <div class="context-bar">
    <div class="context-bar-inner">
      <div class="context-stat">
        <span class="context-stat-value" id="stat-total">—</span>
        <span class="context-stat-label">전체 인사이트</span>
      </div>
      <div class="context-divider"></div>
      <div class="context-stat">
        <span class="context-stat-value" id="stat-today">—</span>
        <span class="context-stat-label">오늘 수집</span>
      </div>
      <div class="context-divider"></div>
      <div class="context-stat-text">전일 14:00 ~ 금일 08:00</div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-inner">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M21 21L16.5 16.5M19 11C19 15.4183 15.4183 19 11 19S3 15.4183 3 11 6.58172 3 11 3 19 6.58172 19 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <input type="text" id="search-input" class="search-input" placeholder="카테고리, 제목, 내용 검색...">
      <button class="search-clear" id="search-clear" aria-label="검색 초기화">✕</button>
    </div>
  </div>

  <div class="tabs-sticky">
    <div class="tabs-inner" id="category-tabs">
      <button class="tab active" data-category="all">전체</button>
      <button class="tab" data-category="general">일반</button>
      <button class="tab" data-category="retail-finance">소매금융</button>
      <button class="tab" data-category="corporate-finance">기업금융</button>
      <button class="tab" data-category="auto-finance">자동차금융</button>
      <button class="tab" data-category="AX">AX</button>
      <button class="tab" data-category="IT">IT</button>
    </div>
  </div>

  <main class="main">

    <section id="snapshot-section" style="display:none">
      <div class="section-header">
        <div class="section-header-left">
          <span class="section-title" id="snapshot-label"></span>
          <span class="section-badge-new">NEW</span>
        </div>
        <span class="section-count" id="snapshot-count"></span>
      </div>
      <div id="snapshot-grid" class="snapshot-grid"></div>
    </section>

    <section id="archive-section">
      <div class="section-header">
        <span class="section-title">전략 인사이트 아카이브</span>
        <span class="section-count" id="total-count"></span>
      </div>
      <div id="archive-list" class="archive-list"></div>
    </section>

  </main>

  <script src="assets/js/app.js?v=20260514"></script>
</body>
</html>
