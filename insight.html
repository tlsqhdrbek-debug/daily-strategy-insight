<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BNK 캐피탈 전략 인사이트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=20260519c">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="bnk-icon">
          <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="38" height="38" rx="9" fill="#C41313"/>
            <path d="M0 26H38V29C38 33.9706 33.9706 38 29 38H9C4.02944 38 0 33.9706 0 29V26Z" fill="#720000"/>
            <text x="19" y="23" font-family="'Arial Black','Helvetica Neue',sans-serif" font-weight="900" font-size="16" fill="white" text-anchor="middle">BNK</text>
            <text x="19" y="34" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="5.5" fill="white" text-anchor="middle" letter-spacing="1.5">CAPITAL</text>
          </svg>
        </div>
        <div class="header-title">전략 인사이트</div>
      </div>
      <div class="header-right">
        <div class="live-indicator">
          <span class="live-dot"></span>
          <span class="live-label">LIVE</span>
        </div>
        <span id="current-date" class="header-date"></span>
      </div>
    </div>
  </header>

  <nav class="subnav">
    <div class="subnav-inner">
      <button class="subnav-btn" onclick="history.length > 1 ? history.back() : location.href='index.html'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        뒤로
      </button>
      <button class="subnav-btn" onclick="location.href='index.html'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 9L12 2L21 9V20C21 20.5523 20.5523 21 20 21H15V16H9V21H4C3.44772 21 3 20.5523 3 20V9Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        홈으로
      </button>
    </div>
  </nav>

  <div class="insight-main">
    <div id="meta-card" class="meta-card"></div>
    <div id="content-card" class="content-card">
      <div id="insight-body" class="insight-body"></div>
    </div>
  </div>

  <footer style="text-align:center;padding:16px 20px;font-size:12px;color:#999;border-top:1px solid #f0f0f0;background:#fafafa;">
    본 인사이트는 AI 도구를 활용하여 작성되었습니다. AI는 실수가 포함될 수 있으므로, 참고 자료로만 활용하시기 바랍니다.
  </footer>

  <script src="assets/js/auth.js?v=20260603a"></script>
  <script src="assets/js/app.js?v=20260603a"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      setCurrentDate();
      const key = await DSIAuth.requireAuth();
      if (!key) return;
      loadDetail();
    });

    async function loadDetail() {
      const file = new URLSearchParams(location.search).get('file');
      if (!file) { showError('잘못된 접근입니다.'); return; }

      try {
        const [insightsRes, plaintext] = await Promise.all([
          fetch('data/insights.json'),
          DSIAuth.fetchEncrypted(file)
        ]);

        if (!insightsRes.ok) throw new Error('insights.json 로드 실패');
        const insights = await insightsRes.json();
        const item = insights.find(i => i.path === file);

        if (item) renderMeta(item);
        else document.getElementById('meta-card').style.display = 'none';

        document.getElementById('insight-body').innerHTML = plaintext;

        if (item) document.title = `${item.categoryName} 전략인사이트 · ${item.date}`;
      } catch (e) {
        console.error(e);
        showError(`인사이트 파일을 불러오지 못했습니다. (${e.message})`);
      }
    }

    function renderMeta(item) {
      const card = document.getElementById('meta-card');
      card.dataset.cat = item.category;
      card.innerHTML = `
        <div class="meta-card-head">
          <div class="meta-cat-info">
            <span class="badge badge-${item.category}">${item.categoryName}</span>
            <span class="meta-section-title">${item.categoryName} 전략인사이트</span>
          </div>
          <span class="meta-footer-inline">${item.date}&nbsp;·&nbsp;${item.time} 게시</span>
        </div>
      `;
    }

    function showError(msg) {
      document.getElementById('meta-card').style.display = 'none';
      document.getElementById('content-card').innerHTML =
        `<div class="empty-state"><div class="empty-icon">⚠️</div>${msg}</div>`;
    }
  </script>
</body>
</html>
