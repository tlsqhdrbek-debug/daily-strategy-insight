<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Strategy Insight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <div class="header-title">Daily Strategy Insight Hub</div>
        <div class="header-subtitle">전일 14:00 ~ 금일 08:00 수집 기사 기반</div>
      </div>
      <span id="current-date" class="header-date"></span>
    </div>
  </header>

  <!-- 서브 네비게이션 -->
  <nav class="subnav">
    <div class="subnav-inner">
      <button class="subnav-btn" onclick="history.back()">← 뒤로가기</button>
      <button class="subnav-btn" onclick="location.href='index.html'">홈으로</button>
    </div>
  </nav>

  <!-- 본문 -->
  <div class="insight-main">
    <div id="meta-card" class="meta-card"></div>
    <div id="content-card" class="content-card">
      <div id="insight-body" class="insight-body"></div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setCurrentDate();
      loadDetail();
    });

    async function loadDetail() {
      const file = new URLSearchParams(location.search).get('file');
      if (!file) {
        showError('잘못된 접근입니다.');
        return;
      }

      try {
        const [insightsRes, contentRes] = await Promise.all([
          fetch('data/insights.json'),
          fetch(file)
        ]);

        if (!insightsRes.ok) throw new Error('insights.json 로드 실패');
        const insights = await insightsRes.json();
        const item = insights.find(i => i.path === file);

        if (item) renderMeta(item);
        else document.getElementById('meta-card').style.display = 'none';

        if (!contentRes.ok) throw new Error(`파일 로드 실패 (${contentRes.status})`);
        document.getElementById('insight-body').innerHTML = await contentRes.text();

        if (item) document.title = `${item.categoryName} — ${item.date}`;
      } catch (e) {
        console.error(e);
        showError(`인사이트 파일을 불러오지 못했습니다. (${e.message})`);
      }
    }

    function renderMeta(item) {
      document.getElementById('meta-card').innerHTML = `
        <div><span class="badge badge-${item.category}">${item.categoryName}</span></div>
        <div class="meta-card-title">${item.title}</div>
        ${item.summary ? `<div class="meta-card-summary">${item.summary}</div>` : ''}
        <div class="meta-divider"></div>
        <div class="meta-footer">${item.date} · ${item.time}</div>
      `;
    }

    function showError(msg) {
      document.getElementById('content-card').innerHTML =
        `<div class="empty-state">${msg}</div>`;
    }
  </script>
</body>
</html>
